blank_issues_enabled: false
# The low-friction, unconfirmed reports go to this repo's Discord forum;
# GitHub issues are for confirmed bugs and features. Private repos without a
# forum channel drop this whole `contact_links` block.
contact_links:
  - name: ❓ Question
    url: https://discord.kirch.dev/
    about: Ask in this repo's Discord forum — questions are answered there, not in issues.
  - name: 💡 Idea
    url: https://discord.kirch.dev/
    about: Float it in the Discord forum first; ideas that firm up become a feature request.
  - name: 🐛 Possible bug
    url: https://discord.kirch.dev/
    about: Not sure it's a real bug? Start in the forum — confirmed ones move to an issue.
