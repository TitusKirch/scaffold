name: ✨ Feature request
description: Suggest an idea or improvement
labels: ['enhancement', 'triage']
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before you start
      options:
        - label: I searched existing issues and didn't find a duplicate
          required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point, not just the proposed solution.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Sketches, API shapes or config snippets welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've weighed and why they don't fit.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, related issues, screenshots.
